<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Моей Маше</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #0a0012;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        canvas#matrix {
            position: fixed;
            top: 0; left: 0;
            z-index: 0;
        }

        .container {
            position: relative;
            z-index: 1;
            text-align: center;
        }

        canvas#heart {
            display: block;
            margin: 0 auto;
        }

        canvas#text {
            display: block;
            margin: 15px auto 0;
        }

        .particle {
            position: fixed;
            border-radius: 50%;
            pointer-events: none;
            opacity: 0;
            animation: floatUp linear infinite;
        }

        @keyframes floatUp {
            0% { transform: translateY(100vh) scale(0); opacity: 0; }
            10% { opacity: 0.8; }
            90% { opacity: 0.4; }
            100% { transform: translateY(-10vh) scale(1); opacity: 0; }
        }
    </style>
</head>
<body>
    <canvas id="matrix"></canvas>

    <div class="container">
        <canvas id="heart" width="400" height="360"></canvas>
        <canvas id="text" width="600" height="80"></canvas>
    </div>

    <script>
        // === Matrix rain ===
        const mCanvas = document.getElementById('matrix');
        const mCtx = mCanvas.getContext('2d');
        mCanvas.width = window.innerWidth;
        mCanvas.height = window.innerHeight;

        const codeChars = '01{}[]<>//;:=+*&^%$#@!~|defconstvarletfunctionreturnifelse';
        const fSize = 14;
        const cols = Math.floor(mCanvas.width / fSize);
        const drops = Array.from({ length: cols }, () => Math.random() * -50);

        function drawMatrix() {
            mCtx.fillStyle = 'rgba(10, 0, 18, 0.06)';
            mCtx.fillRect(0, 0, mCanvas.width, mCanvas.height);
            mCtx.font = fSize + 'px monospace';

            for (let i = 0; i < cols; i++) {
                const ch = codeChars[Math.floor(Math.random() * codeChars.length)];
                const bright = Math.random() > 0.96;
                mCtx.fillStyle = bright ? '#ff69b4' : 'rgba(80,20,80,0.8)';
                mCtx.fillText(ch, i * fSize, drops[i] * fSize);

                if (drops[i] * fSize > mCanvas.height && Math.random() > 0.97) {
                    drops[i] = 0;
                }
                drops[i] += 0.5;
            }
        }

        setInterval(drawMatrix, 40);

        // === Heart canvas ===
        const hCanvas = document.getElementById('heart');
        const hCtx = hCanvas.getContext('2d');
        const W = hCanvas.width;
        const H = hCanvas.height;

        function heartPoint(t) {
            const x = 16 * Math.pow(Math.sin(t), 3);
            const y = -(13 * Math.cos(t) - 5 * Math.cos(2 * t) - 2 * Math.cos(3 * t) - Math.cos(4 * t));
            return { x, y };
        }

        const codeSymbols = ['0','1','{','}','[',']','<','>','/','\\',';',':','=','+','*','&','^','%','$','#','@','!','~','(',')','f','n','v','r','e','t','u','a','l','c','d','p','m','i'];
        const heartPoints = [];

        for (let i = 0; i < 200; i++) {
            const t = (i / 200) * Math.PI * 2;
            const p = heartPoint(t);
            heartPoints.push({
                x: W / 2 + p.x * 11,
                y: H / 2 + p.y * 11 - 10,
                char: codeSymbols[Math.floor(Math.random() * codeSymbols.length)],
                isOutline: true
            });
        }

        for (let i = 0; i < 600; i++) {
            const t = Math.random() * Math.PI * 2;
            const r = Math.random() * 0.95;
            const p = heartPoint(t);
            heartPoints.push({
                x: W / 2 + p.x * 11 * r,
                y: H / 2 + p.y * 11 * r - 10,
                char: codeSymbols[Math.floor(Math.random() * codeSymbols.length)],
                isOutline: false
            });
        }

        const startTime = Date.now();

        function animateHeart() {
            hCtx.clearRect(0, 0, W, H);
            const elapsed = Date.now() - startTime;
            const breathe = 1 + 0.04 * Math.sin(Date.now() / 500);
            const waveSpeed = 0.003;

            heartPoints.forEach(pt => {
                const dist = Math.sqrt(Math.pow(pt.x - W/2, 2) + Math.pow(pt.y - H/2, 2));
                const delay = (dist / 200) * 2000;
                const localElapsed = elapsed - delay;
                if (localElapsed < 0) return;

                const alpha = Math.min(localElapsed / 600, 1);
                const wave = Math.sin(dist * waveSpeed - Date.now() / 300);
                const hueShift = wave * 30;
                const sizeShift = 1 + wave * 0.15;

                hCtx.save();
                hCtx.translate(pt.x, pt.y);
                hCtx.scale(breathe * sizeShift, breathe * sizeShift);
                hCtx.font = (pt.isOutline ? 'bold 12px' : '10px') + ' "Courier New"';
                hCtx.fillStyle = `rgba(255,${Math.floor(105+hueShift)},${Math.floor(180+hueShift)},${alpha * (pt.isOutline ? 1 : 0.7)})`;
                hCtx.shadowColor = pt.isOutline ? '#ff1493' : '#ff69b4';
                hCtx.shadowBlur = pt.isOutline ? 8 : 3;
                hCtx.fillText(pt.char, 0, 0);
                hCtx.restore();
            });

            const glowAlpha = 0.1 + 0.05 * Math.sin(Date.now() / 400);
            const gradient = hCtx.createRadialGradient(W/2, H/2-10, 0, W/2, H/2-10, 120);
            gradient.addColorStop(0, `rgba(255,105,180,${glowAlpha})`);
            gradient.addColorStop(1, 'transparent');
            hCtx.fillStyle = gradient;
            hCtx.fillRect(0, 0, W, H);

            requestAnimationFrame(animateHeart);
        }

        animateHeart();

        // === Text canvas: "моей Маше" из символов кода ===
        const tCanvas = document.getElementById('text');
        const tCtx = tCanvas.getContext('2d');
        const TW = tCanvas.width;
        const TH = tCanvas.height;

        // Рисуем текст на скрытом canvas и собираем его из пикселей
        function getTextPixels(text, fontSize, fontFamily) {
            const off = document.createElement('canvas');
            off.width = TW;
            off.height = TH;
            const ctx = off.getContext('2d');
            ctx.font = `bold ${fontSize}px ${fontFamily}`;
            ctx.fillStyle = '#fff';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(text, TW / 2, TH / 2);

            const imgData = ctx.getImageData(0, 0, TW, TH);
            const pixels = [];
            const step = 3;

            for (let y = 0; y < TH; y += step) {
                for (let x = 0; x < TW; x += step) {
                    const idx = (y * TW + x) * 4;
                    if (imgData.data[idx + 3] > 128) {
                        pixels.push({
                            x, y,
                            char: codeSymbols[Math.floor(Math.random() * codeSymbols.length)]
                        });
                    }
                }
            }
            return pixels;
        }

        const textPixels = getTextPixels('моей Маше', 42, 'Georgia');
        const textStartTime = Date.now() + 3000; // появляется после сердца

        function animateText() {
            tCtx.clearRect(0, 0, TW, TH);
            const elapsed = Date.now() - textStartTime;

            const breathe = 1 + 0.03 * Math.sin(Date.now() / 600);
            const waveSpeed = 0.01;

            textPixels.forEach(pt => {
                // Волна появления слева направо
                const delay = (pt.x / TW) * 2000;
                const localElapsed = elapsed - delay;
                if (localElapsed < 0) return;

                const alpha = Math.min(localElapsed / 400, 1);
                const wave = Math.sin(pt.x * waveSpeed - Date.now() / 400);
                const hueShift = wave * 20;

                tCtx.save();
                tCtx.translate(pt.x, pt.y);
                tCtx.scale(breathe * (1 + wave * 0.08), breathe * (1 + wave * 0.08));
                tCtx.font = '7px "Courier New"';
                tCtx.fillStyle = `rgba(255,${Math.floor(160+hueShift)},${Math.floor(200+hueShift)},${alpha * 0.9})`;
                tCtx.shadowColor = '#ff69b4';
                tCtx.shadowBlur = 4;
                tCtx.fillText(pt.char, 0, 0);
                tCtx.restore();
            });

            requestAnimationFrame(animateText);
        }

        animateText();

        // === Частицы ===
        function spawnParticle() {
            const p = document.createElement('div');
            p.className = 'particle';
            const size = 2 + Math.random() * 5;
            p.style.width = size + 'px';
            p.style.height = size + 'px';
            p.style.left = Math.random() * 100 + 'vw';
            p.style.background = Math.random() > 0.5 ? '#ff69b4' : '#ffb6c1';
            p.style.boxShadow = `0 0 ${size * 2}px #ff69b4`;
            p.style.animationDuration = (4 + Math.random() * 6) + 's';
            document.body.appendChild(p);
            setTimeout(() => p.remove(), 10000);
        }

        setInterval(spawnParticle, 200);

        // === Resize ===
        window.addEventListener('resize', () => {
            mCanvas.width = window.innerWidth;
            mCanvas.height = window.innerHeight;
        });
    </script>
</body>
</html>
